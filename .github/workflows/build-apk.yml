name: Build UltraLite Android APK

# Trigger on push to main, on tags, or manually.
on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '.github/**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect project layout
        id: layout
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "frontend_dir=frontend" >> $GITHUB_OUTPUT
            echo "Detected: monorepo layout (frontend/ subdirectory)"
          elif [ -f "package.json" ]; then
            echo "frontend_dir=." >> $GITHUB_OUTPUT
            echo "Detected: flat layout (package.json at repo root)"
          else
            echo "Could not find package.json in repo root or frontend/"
            ls -la
            exit 1
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Free up runner disk + add swap
        shell: bash
        run: |
          set -e
          echo "Disk before:" && df -h | head -5
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/local/lib/android/sdk/ndk/23* \
                      /usr/local/lib/android/sdk/ndk/24* \
                      /usr/local/lib/android/sdk/ndk/25* || true
          sudo apt-get clean || true
          # Add 8GB swap so CMake/linker never OOMs mid-link
          sudo fallocate -l 8G /swapfile2 2>/dev/null || true
          sudo chmod 600 /swapfile2 2>/dev/null || true
          sudo mkswap /swapfile2 2>/dev/null || true
          sudo swapon /swapfile2 2>/dev/null || true
          echo "Disk after:" && df -h | head -5
          free -h

      - name: Install dependencies
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            yarn install
          fi

      - name: Decode google-services.json from secret (optional override)
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: Expo prebuild (Android)
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        run: npx expo prebuild --platform android --clean --no-install
        env:
          CI: '1'

      - name: Configure Gradle (ABI filter + memory + parallel + cache)
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        shell: bash
        run: |
          set -e

          # Append speed-up + memory flags (idempotent — replaces existing lines).
          # newArchEnabled + hermesEnabled come from expo prebuild (driven by app.json).
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/gradle.properties')
          existing = p.read_text()
          extra = [
            'org.gradle.parallel=true',
            'org.gradle.configureondemand=true',
            'org.gradle.caching=true',
            'org.gradle.jvmargs=-Xmx6g -XX:+HeapDumpOnOutOfMemoryError -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8',
            'reactNativeArchitectures=arm64-v8a,armeabi-v7a',
            'android.useAndroidX=true',
            'android.enableJetifier=true',
          ]
          lines = existing.splitlines()
          keys_to_set = {l.split('=', 1)[0]: l for l in extra}
          out = []
          seen = set()
          for l in lines:
              if '=' in l:
                  k = l.split('=', 1)[0]
                  if k in keys_to_set:
                      out.append(keys_to_set[k])
                      seen.add(k)
                      continue
              out.append(l)
          for k, l in keys_to_set.items():
              if k not in seen:
                  out.append(l)
          p.write_text("\n".join(out) + "\n")
          PY

          # Limit to real-device ABIs — drop x86/x86_64. Cuts CMake time drastically.
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          s = p.read_text()
          if 'abiFilters' in s:
              print('ABI filter already configured in build.gradle, skipping inject')
          else:
              inject = """
          android {
              defaultConfig {
                  ndk {
                      abiFilters "arm64-v8a", "armeabi-v7a"
                  }
              }
          }
          """
              p.write_text(s + "\n" + inject)
              print('Injected ABI filter into build.gradle')
          PY

          echo "--- gradle.properties ---"
          cat android/gradle.properties
          echo "-------------------------"

      - name: Decode keystore
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore

      - name: Configure Gradle signing (release)
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF
          UL_RELEASE_STORE_FILE=upload.keystore
          UL_RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD}
          UL_RELEASE_KEY_ALIAS=${KEY_ALIAS}
          UL_RELEASE_KEY_PASSWORD=${KEY_PASSWORD}
          EOF

          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          s = p.read_text()
          if 'UL_RELEASE_STORE_FILE' not in s:
              inject = """
          android {
              signingConfigs {
                  release {
                      if (project.hasProperty('UL_RELEASE_STORE_FILE')) {
                          storeFile file(UL_RELEASE_STORE_FILE)
                          storePassword UL_RELEASE_STORE_PASSWORD
                          keyAlias UL_RELEASE_KEY_ALIAS
                          keyPassword UL_RELEASE_KEY_PASSWORD
                      }
                  }
              }
              buildTypes {
                  release {
                      if (project.hasProperty('UL_RELEASE_STORE_FILE')) {
                          signingConfig signingConfigs.release
                      }
                  }
              }
          }
          """
              s = s + "\n" + inject
              p.write_text(s)
          PY

      - name: Make gradlew executable
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: ${{ steps.layout.outputs.frontend_dir }}/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Release AAB (App Bundle)
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        working-directory: ${{ steps.layout.outputs.frontend_dir }}/android
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Find artifacts
        id: artifacts
        working-directory: ${{ steps.layout.outputs.frontend_dir }}
        run: |
          set -e
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" 2>/dev/null | head -n 1 || echo "")
          FRONT="${{ steps.layout.outputs.frontend_dir }}"
          if [ "$FRONT" = "." ]; then PREFIX=""; else PREFIX="${FRONT}/"; fi
          echo "apk_full=${PREFIX}${APK_PATH}" >> $GITHUB_OUTPUT
          if [ -n "$AAB_PATH" ]; then
            echo "aab_full=${PREFIX}${AAB_PATH}" >> $GITHUB_OUTPUT
          else
            echo "aab_full=" >> $GITHUB_OUTPUT
          fi
          ls -lh "$APK_PATH" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultralite-release-apk
          path: ${{ steps.artifacts.outputs.apk_full }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ steps.artifacts.outputs.aab_full != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ultralite-release-aab
          path: ${{ steps.artifacts.outputs.aab_full }}
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.apk_full }}
            ${{ steps.artifacts.outputs.aab_full }}
          generate_release_notes: true
